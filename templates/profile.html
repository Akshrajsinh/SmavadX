<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ view_user }} — SamvadX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shell.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/feed.css') }}">
</head>
<body data-username="{{ username }}" data-view-user="{{ view_user }}">
  <div class="app-shell">
    {% include "_rail.html" %}

    <main class="page-main">
      <div class="topbar">
        <h1 class="brand" id="profileTitle">{{ view_user }}</h1>
        <div></div>
      </div>

      <div id="profileSkeleton" class="profile-header">
        <div class="avatar skeleton" style="width:150px;height:150px;"></div>
        <div class="profile-info">
          <div class="skeleton" style="height:24px;width:160px;margin-bottom:16px;border-radius:6px;"></div>
          <div class="skeleton" style="height:16px;width:240px;margin-bottom:16px;border-radius:6px;"></div>
          <div class="skeleton" style="height:14px;width:300px;border-radius:6px;"></div>
        </div>
      </div>

      <div id="profileContent" style="display:none;">
        <div class="profile-header">
          <img class="avatar profile-avatar" id="profileAvatar" src="" alt="" onerror="this.onerror=null;this.src='/uploads/default.png';">
          <div class="profile-info">
            <div class="profile-top-row">
              <h2 id="profileUsername"></h2>
              <div id="profileActions"></div>
            </div>
            <div class="profile-stats">
              <span><strong id="statPosts">0</strong> posts</span>
              <span><strong id="statFollowers">0</strong> followers</span>
              <span><strong id="statFollowing">0</strong> following</span>
            </div>
            <div class="profile-bio" id="profileBio"></div>
          </div>
        </div>

        <div id="profileGridWrap">
          <div class="profile-grid" id="profileGrid"></div>
        </div>
        <div class="profile-private-msg" id="profilePrivateMsg" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <h3 style="font-family:var(--font-display);color:var(--text);margin:0;">This account is private</h3>
          <p>Follow to see their posts.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit profile modal -->
  <div class="modal-overlay" id="editProfileModal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Edit profile</h2>
        <button class="modal-close" data-close="editProfileModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="auth-upload" style="margin-bottom:20px;">
          <img id="editAvatarPreview" src="" style="width:60px;height:60px;border-radius:50%;" onerror="this.onerror=null;this.src='/uploads/default.png';">
          <label for="editProfileFile">Change photo
            <input type="file" id="editProfileFile" accept="image/png,image/jpeg,image/gif,image/webp">
          </label>
        </div>
        <label class="field-label">Bio</label>
        <textarea class="field-input" id="editBioInput" maxlength="150" placeholder="Tell people about yourself"></textarea>
        <label style="display:flex;align-items:center;gap:10px;font-size:0.85rem;color:var(--text-dim);cursor:pointer;">
          <input type="checkbox" id="editPrivateCheckbox">
          Private account
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="editProfileModal">Cancel</button>
        <button class="btn btn-primary" id="saveProfileBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/shell.js') }}"></script>
  <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
